<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1628"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c73652;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00a88a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00c9a7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent panel -->
  <rect x="0" y="0" width="420" height="630" fill="url(#bgGrad)"/>

  <!-- Top coral accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accentGrad)"/>

  <!-- Bottom teal accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#tealGrad)"/>

  <!-- Left vertical accent line -->
  <rect x="80" y="60" width="3" height="510" fill="#e94560" opacity="0.7"/>

  <!-- Monogram circle -->
  <circle cx="180" cy="150" r="70" fill="#0f3460" stroke="#e94560" stroke-width="3"/>
  <text x="180" y="168" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="#f0f6ff" text-anchor="middle">SK</text>

  <!-- Name -->
  <text x="110" y="280" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="-1">Stanely Kimani</text>
  <text x="110" y="345" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="#e94560" letter-spacing="-1">Macharia</text>

  <!-- Role line 1 -->
  <text x="110" y="395" font-family="Arial, sans-serif" font-weight="700" font-size="19" fill="#94b8e0" letter-spacing="2">FULL-STACK SOFTWARE ENGINEER</text>
  <!-- Role line 2 -->
  <text x="110" y="422" font-family="Arial, sans-serif" font-weight="700" font-size="19" fill="#94b8e0" letter-spacing="2">DATABASE ADMINISTRATOR · ICT SYSTEMS</text>

  <!-- Divider line -->
  <rect x="110" y="445" width="500" height="2" fill="#e94560" opacity="0.5"/>

  <!-- Tech tags -->
  <!-- Laravel -->
  <rect x="110" y="462" width="110" height="30" rx="15" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="165" y="482" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#e94560" text-anchor="middle">Laravel</text>

  <!-- Flutter -->
  <rect x="232" y="462" width="100" height="30" rx="15" fill="#0f3460" stroke="#00c9a7" stroke-width="1.5"/>
  <text x="282" y="482" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#00c9a7" text-anchor="middle">Flutter</text>

  <!-- PostgreSQL -->
  <rect x="344" y="462" width="130" height="30" rx="15" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="409" y="482" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#e94560" text-anchor="middle">PostgreSQL</text>

  <!-- DigitalOcean -->
  <rect x="486" y="462" width="148" height="30" rx="15" fill="#0f3460" stroke="#00c9a7" stroke-width="1.5"/>
  <text x="560" y="482" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#00c9a7" text-anchor="middle">DigitalOcean</text>

  <!-- Stats section — right side -->
  <!-- Stat card 1 -->
  <rect x="720" y="80" width="200" height="130" rx="10" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="820" y="145" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="42" fill="#e94560" text-anchor="middle">500+</text>
  <text x="820" y="178" font-family="Arial, sans-serif" font-size="14" fill="#94b8e0" text-anchor="middle">Properties Managed</text>

  <!-- Stat card 2 -->
  <rect x="950" y="80" width="200" height="130" rx="10" fill="#0f3460" stroke="#00c9a7" stroke-width="1.5"/>
  <text x="1050" y="145" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="42" fill="#00c9a7" text-anchor="middle">4</text>
  <text x="1050" y="178" font-family="Arial, sans-serif" font-size="14" fill="#94b8e0" text-anchor="middle">Production Systems</text>

  <!-- Stat card 3 -->
  <rect x="720" y="240" width="200" height="130" rx="10" fill="#0f3460" stroke="#00c9a7" stroke-width="1.5"/>
  <text x="820" y="300" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="34" fill="#00c9a7" text-anchor="middle">22,070</text>
  <text x="820" y="330" font-family="Arial, sans-serif" font-size="14" fill="#94b8e0" text-anchor="middle">PII Records Encrypted</text>
  <text x="820" y="350" font-family="Arial, sans-serif" font-size="13" fill="#94b8e0" text-anchor="middle">AES-256-CBC · Live</text>

  <!-- Stat card 4 -->
  <rect x="950" y="240" width="200" height="130" rx="10" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="1050" y="300" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="34" fill="#e94560" text-anchor="middle">130K+</text>
  <text x="1050" y="330" font-family="Arial, sans-serif" font-size="14" fill="#94b8e0" text-anchor="middle">Financial Records</text>
  <text x="1050" y="350" font-family="Arial, sans-serif" font-size="13" fill="#94b8e0" text-anchor="middle">Reconciled</text>

  <!-- Stat card 5 -->
  <rect x="720" y="400" width="200" height="130" rx="10" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="820" y="458" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="42" fill="#e94560" text-anchor="middle">5+</text>
  <text x="820" y="490" font-family="Arial, sans-serif" font-size="14" fill="#94b8e0" text-anchor="middle">Years Experience</text>
  <text x="820" y="510" font-family="Arial, sans-serif" font-size="13" fill="#94b8e0" text-anchor="middle">Nairobi, Kenya</text>

  <!-- Stat card 6 — Open to Opportunities badge -->
  <rect x="950" y="400" width="200" height="130" rx="10" fill="url(#tealGrad)"/>
  <text x="1050" y="452" font-family="Arial, sans-serif" font-weight="900" font-size="13" fill="#ffffff" text-anchor="middle" letter-spacing="1">● OPEN TO</text>
  <text x="1050" y="474" font-family="Arial, sans-serif" font-weight="900" font-size="13" fill="#ffffff" text-anchor="middle" letter-spacing="1">OPPORTUNITIES</text>
  <text x="1050" y="505" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" opacity="0.85">stan-mash.github.io</text>

</svg>
